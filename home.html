<meta charset="utf-8">
<script>
/* Access gate. Runs before anything renders: captures a session handed back by
   the auth Worker (home.html#session=…), and bounces to the landing page if
   there is no unexpired session. Home is open to any signed-in tier; the Worker
   only ever issues a session to home-role or officer holders. */
(function(){
  var m = location.hash.match(/(?:^#|&)session=([^&]+)/);
  if(m){
    try{ localStorage.setItem('vashj_session', decodeURIComponent(m[1])); }catch(e){}
    history.replaceState(null, '', location.pathname + location.search);
  }
  function valid(tok){
    if(!tok) return false;
    try{
      var p = tok.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      while(p.length % 4) p += '=';
      var payload = JSON.parse(atob(p));
      return payload.exp && payload.exp > Math.floor(Date.now()/1000);
    }catch(e){ return false; }
  }
  var tok = null;
  try{ tok = localStorage.getItem('vashj_session'); }catch(e){}
  if(!valid(tok)){
    try{ localStorage.removeItem('vashj_session'); }catch(e){}
    location.replace('index.html');
  }
})();
</script>
