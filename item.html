<meta charset="utf-8">
<script>
/* Access gate. Same as character.html / loot-history.html: the item page is open
   to any signed-in tier — it is built from /api/items, which is session-gated;
   this only decides whether the page renders at all. */
(function(){
  var m = location.hash.match(/(?:^#|&)session=([^&]+)/);
  if(m){
    try{ localStorage.setItem('vashj_session', decodeURIComponent(m[1])); }catch(e){}
    history.replaceState(null, '', location.pathname + location.search);
  }
  function valid(tok){
    if(!tok) return false;
    try{
      var p = tok.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      while(p.length % 4) p += '=';
      var payload = JSON.parse(atob(p));
      return payload.exp && payload.exp > Math.floor(Date.now()/1000);
    }catch(e){ return false; }
  }
  var tok = null;
  try{ tok = localStorage.getItem('vashj_session'); }catch(e){}
  if(!valid(tok)){
    try{ localStorage.removeItem('vashj_session'); }catch(e){}
    location.replace('index.html');
  }
})();
</script>

<style>
  /* it- = item page. Deliberately parallel to character.html's cs- block, which
     it borrows its panel and table shapes from. */
  .it-head{
    background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
    padding:16px 18px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start;
  }
  .it-icon{
    width:56px;height:56px;border-radius:8px;border:1px solid var(--panel-line);
    flex:0 0 auto;background:#0b1a17;
  }
  .it-head-body{min-width:0}
  .it-name{font-family:'Cinzel',serif;font-size:26px;font-weight:700;line-height:1.1}
  /* The name is the Wowhead link; its quality colour comes from the widget. */
  .it-name a{color:inherit;text-decoration:none}
  .it-name a:hover{text-decoration:underline}
  .it-sub{font-size:12.5px;color:var(--text-dim);margin-top:6px}
  .it-sub a{color:var(--teal)}

  .it-panel{
    background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
    padding:14px 18px 16px;margin-bottom:16px;overflow-x:auto;
  }
  .it-panel h2{
    font-family:'Cinzel',serif;font-size:15px;font-weight:700;margin:0 0 4px;
    color:#eafff6;letter-spacing:.3px;
  }
  .it-panel-note{font-size:11.5px;color:var(--text-dim);margin:0 0 12px}
  .it-empty{font-size:12.5px;color:var(--text-dim);font-style:italic;padding:6px 0}

  .it-tiles{display:flex;flex-wrap:wrap;gap:22px;margin-bottom:12px}
  .it-tiles div{font-size:11.5px;color:var(--text-dim)}
  .it-tiles b{display:block;font-size:20px;color:var(--text);font-weight:700;font-family:'Cinzel',serif}

  /* Explicit colour on cells and links: the page runs in quirks mode (no doctype,
     like every page here), where a <table> drops colour inheritance and cells fall
     back to black, and an unstyled anchor lands on the browser's default blue. */
  table.it-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .it-table th{
    text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.9px;
    color:var(--text-dim);font-weight:600;padding:0 10px 6px 0;
  }
  .it-table td{padding:6px 10px 6px 0;border-top:1px solid rgba(31,74,63,.4);vertical-align:top;color:var(--text)}
  .it-table a{color:var(--text);text-decoration:none}
  .it-table a:hover{text-decoration:underline}
  .it-table td.num{text-align:right;padding-right:16px;font-variant-numeric:tabular-nums}
  .it-muted{color:var(--text-dim)}
  .it-when{white-space:nowrap}
  .it-tag{
    font-size:9px;font-weight:700;letter-spacing:.5px;border-radius:3px;padding:1px 4px;
    text-transform:uppercase;background:rgba(232,163,61,.22);color:var(--amber);margin-left:5px;
  }
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .pill-de{background:rgba(232,163,61,.18);color:var(--amber)}
  /* The rolls list, same shape as loot-history.html — here it starts open, since
     the rolls are the point of the page. */
  .rolls{margin:4px 0 2px;padding:0;list-style:none;font-size:12px}
  .rolls li{padding:2px 0;color:var(--text-dim)}
  .rolls .amt{display:inline-block;min-width:34px;color:var(--text);font-weight:600}
  .rolls .cl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;opacity:.75;margin-left:6px}
  .it-msg{color:var(--text-dim);padding:26px 4px;font-size:13.5px}
</style>

<script src="menu.js"></script>
<script>
// API_BASE, WOWHEAD_DOMAIN, wowheadHref() and loadWowhead() come from menu.js.

/* The item's name is itself the Wowhead link, so renameLinks stays on: the widget
   replaces our text with the real name in its quality colour. That is what names a
   gem, which reaches us as a bare id from the log and so has no name of its own.
   Our own text is the fallback when the widget is blocked. Nothing else on the page
   is a Wowhead link, so nothing else gets renamed. */

const WCL_HOST = 'https://fresh.warcraftlogs.com';
const ICON_HOST = 'https://wow.zamimg.com/images/wow/icons/large/';

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// WoW class colours (Blizzard palette), shared with character.html / loot-history.html.
const CLASS_COLORS = {
  warrior:'#c79c6e', paladin:'#f58cba', hunter:'#abd473', rogue:'#fff569',
  priest:'#ffffff', deathknight:'#e0475f', shaman:'#3b8de0', mage:'#69ccf0',
  warlock:'#a99ce0', monk:'#00ff96', druid:'#ff7d0a', demonhunter:'#a330c9',
  evoker:'#33937f'
};
function classColor(cls){
  if(!cls) return null;
  return CLASS_COLORS[String(cls).toLowerCase().replace(/[^a-z]/g,'')] || null;
}
// Wowhead's quality palette, for the item's own name.
const QUALITY_COLORS = ['#9d9d9d','#ffffff','#1eff00','#0070dd','#a335ee','#ff8000','#e6cc80'];

function fmtDate(s){
  if(!s) return '';
  const d = new Date(s);
  return isNaN(d) ? '' : d.toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
}
function tile(value, label){ return '<div><b>' + esc(value) + '</b>' + esc(label) + '</div>'; }

// A character's name in its class colour, linked to their sheet.
function charName(name, cls, id){
  const c = classColor(cls);
  const inner = '<strong' + (c ? ' style="color:' + c + '"' : '') + '>' + esc(name) + '</strong>';
  return id ? '<a href="character.html?id=' + esc(id) + '">' + inner + '</a>' : inner;
}

const params = new URLSearchParams(location.search);

async function api(path){
  const res = await fetch(API_BASE + path, { headers:{ 'Authorization':'Bearer ' + sessionToken() } });
  if(res.status === 401){ logout(); throw new Error('signed out'); }
  const body = await res.json().catch(() => null);
  if(!res.ok) throw new Error((body && body.detail) || ('HTTP ' + res.status));
  return body;
}

async function load(){
  const q = params.get('id') ? '?id=' + encodeURIComponent(params.get('id'))
          : params.get('name') ? '?name=' + encodeURIComponent(params.get('name'))
          : '';
  if(!q){
    document.getElementById('msg').textContent = 'No item given — open one from the loot history or a character sheet.';
    return;
  }
  let data;
  try{ data = await api('/api/items' + q); }
  catch(err){
    document.getElementById('msg').textContent = err.message;
    return;
  }
  renderHead(data.item);
  renderEquipped(data.equipped);
  renderAwards(data.awards, data.drops);
  document.title = data.item.name + ' — wooback';
  document.getElementById('msg').style.display = 'none';
  document.getElementById('page').style.display = '';
  loadWowhead();
}

function renderHead(it){
  const col = it.quality != null ? QUALITY_COLORS[it.quality] : null;
  // The icon only exists once a log has recorded the item on someone.
  const icon = it.icon
    ? '<img class="it-icon" src="' + ICON_HOST + esc(it.icon) + '.jpg" alt="">'
    : '';
  const name = it.id
    ? '<a href="' + esc(wowheadHref(it.id)) + '" data-wowhead="item=' + esc(it.id) + '"'
      + ' target="_blank" rel="noopener">' + esc(it.name) + '</a>'
    : esc(it.name);
  const bits = [];
  if(it.ilvl) bits.push('item level ' + Math.round(it.ilvl));
  if(it.id) bits.push('hover the name for its tooltip, click it for Wowhead');

  document.getElementById('head').innerHTML = icon
    + '<div class="it-head-body">'
    + '<div class="it-name"' + (col ? ' style="color:' + col + '"' : '') + '>' + name + '</div>'
    + (bits.length ? '<div class="it-sub">' + bits.join(' · ') + '</div>' : '')
    + '</div>';
}

function renderEquipped(rows){
  const box = document.getElementById('equipped');
  if(!rows || !rows.length){
    box.innerHTML = '<div class="it-empty">Nobody is wearing it in their latest logged raid — gear is read from a '
                  + 'Warcraft Logs report when an officer imports its attendance.</div>';
    return;
  }
  box.innerHTML = '<table class="it-table"><thead><tr>'
    + '<th>Character</th><th>Where</th><th>Enchant</th><th>Last seen</th>'
    + '</tr></thead><tbody>'
    + rows.map(function(r){
        // "alt" only means something once the character is claimed — an unlinked
        // one is nobody's alt, it just has no member yet.
        const who = charName(r.name, r.cls, r.characterId)
                  + (r.member && !r.isMain ? '<span class="it-tag">alt</span>' : '')
                  + (r.member ? ' <span class="it-muted">— ' + esc(r.member) + '</span>' : '');
        const when = fmtDate(r.recordedAt);
        // A gem is worn inside another piece, so say which one it is socketed into.
        const where = r.asGem ? 'Socketed in ' + slotLabel(r.slot).toLowerCase() : slotLabel(r.slot);
        return '<tr><td>' + who + '</td>'
             + '<td class="it-muted">' + esc(where) + '</td>'
             + '<td class="it-muted">' + (r.enchantName ? esc(r.enchantName) : '—') + '</td>'
             + '<td class="it-muted it-when">' + (r.reportCode
                 ? '<a href="' + WCL_HOST + '/reports/' + esc(r.reportCode) + '" target="_blank" rel="noopener">'
                   + esc(when) + '</a>'
                 : esc(when)) + '</td></tr>';
      }).join('')
    + '</tbody></table>';
}

function renderAwards(awards, drops){
  document.getElementById('dropTiles').innerHTML = tile(drops || 0, drops === 1 ? 'time dropped' : 'times dropped');

  const box = document.getElementById('awards');
  if(!awards || !awards.length){
    box.innerHTML = '<div class="it-empty">Never awarded — no drop of it has been recorded.</div>';
    return;
  }
  box.innerHTML = '<table class="it-table"><thead><tr>'
    + '<th>Awarded to</th><th>Raid</th><th>When</th><th>Awarded by</th><th>Rolls</th>'
    + '</tr></thead><tbody>'
    + awards.map(function(a){
        const tags = (a.offSpec ? '<span class="it-tag">OS</span>' : '')
                   + (a.softReserve ? '<span class="it-tag">SR</span>' : '')
                   + (a.wishlist ? '<span class="it-tag">WL</span>' : '')
                   + (a.tmb ? '<span class="it-tag">TMB</span>' : '');
        const winner = a.disenchanted
          ? '<span class="pill pill-de">Disenchanted</span>'
          : (a.character ? charName(a.character, a.characterClass, a.characterId) : '<span class="it-muted">—</span>');
        return '<tr><td>' + winner + tags
             + (a.note ? ' <span class="it-muted">— ' + esc(a.note) + '</span>' : '') + '</td>'
             + '<td class="it-muted">' + (a.raid ? esc(a.raid) : '—') + '</td>'
             + '<td class="it-muted it-when">' + esc(fmtDate(a.awardedAt)) + '</td>'
             + '<td class="it-muted">' + (a.awardedBy ? esc(a.awardedBy) : '—') + '</td>'
             + '<td>' + rollsCell(a.rolls) + '</td></tr>';
      }).join('')
    + '</tbody></table>';
}

function rollsCell(rolls){
  if(!rolls || !rolls.length) return '<span class="it-muted">—</span>';
  return '<ul class="rolls">' + rolls.map(function(x){
    return '<li><span class="amt">' + esc(x.amount) + '</span>'
         + charName(x.player || '?', x.cls, x.playerId)
         + (x.classification ? '<span class="cl">' + esc(x.classification) + '</span>' : '') + '</li>';
  }).join('') + '</ul>';
}

load();
</script>
