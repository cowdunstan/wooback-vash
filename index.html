<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<div class="app">
  <div class="wrap">
    <div class="landing">
      <span class="eyebrow">Guild Tools</span>
      <h1>wooback</h1>
      <p class="subtitle">Sign in with Discord to access the guild's apps.</p>

      <button class="discord-btn" id="signin">
        <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69Z"/></svg>
        Sign in with Discord
      </button>

      <div class="landing-msg" id="msg"></div>
      <p class="landing-note">Some apps require an officer rank on the wooback Discord server.</p>
    </div>
  </div>
</div>

<script>
  // The auth Worker that handles Discord OAuth (see raidhelper-proxy.worker.js).
  const AUTH_BASE = 'https://wooback-vash.cowdunstan.workers.dev';

  document.getElementById('signin').addEventListener('click', function(){
    location.href = AUTH_BASE + '/auth/login';
  });

  function validSession(tok){
    if(!tok) return false;
    try{
      var p = tok.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      while(p.length % 4) p += '=';
      var payload = JSON.parse(atob(p));
      return payload.exp && payload.exp > Math.floor(Date.now()/1000);
    }catch(e){ return false; }
  }

  // Surface a denial / error passed back from the Worker in the URL fragment.
  (function(){
    var params = new URLSearchParams(location.hash.slice(1));
    var msg = document.getElementById('msg');
    if(params.has('denied')){
      var why = params.get('denied');
      msg.textContent = why === 'no_access'
        ? 'That Discord account doesn’t have access to wooback tools.'
        : why === 'not_officer'
        ? 'That Discord account isn’t an officer on the server.'
        : why === 'not_in_server'
        ? 'That Discord account isn’t a member of the wooback server.'
        : 'Access denied.';
      msg.className = 'landing-msg err';
    } else if(params.has('error')){
      msg.textContent = 'Sign-in failed (' + params.get('error') + '). Please try again.';
      msg.className = 'landing-msg err';
    }
    if(location.hash) history.replaceState(null, '', location.pathname);
  })();

  // Already signed in? Skip straight to the home page.
  try{
    if(validSession(localStorage.getItem('vashj_session'))) location.replace('home.html');
  }catch(e){}
</script>
