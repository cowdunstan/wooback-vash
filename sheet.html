<meta charset="utf-8">
<script>
/* Access gate. Same as home.html: the loot sheet is open to any signed-in tier.
   The embedded Google view is a "Publish to web" page (public URL), so this gate
   only decides whether the app shows the page — it isn't a data barrier. */
(function(){
  var m = location.hash.match(/(?:^#|&)session=([^&]+)/);
  if(m){
    try{ localStorage.setItem('vashj_session', decodeURIComponent(m[1])); }catch(e){}
    history.replaceState(null, '', location.pathname + location.search);
  }
  function valid(tok){
    if(!tok) return false;
    try{
      var p = tok.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      while(p.length % 4) p += '=';
      var payload = JSON.parse(atob(p));
      return payload.exp && payload.exp > Math.floor(Date.now()/1000);
    }catch(e){ return false; }
  }
  var tok = null;
  try{ tok = localStorage.getItem('vashj_session'); }catch(e){}
  if(!valid(tok)){
    try{ localStorage.removeItem('vashj_session'); }catch(e){}
    location.replace('index.html');
  }
})();
</script>

<script>
/* The loot sheets' read-only embeds — one document per phase, because the guild
   raids two at once: P3 is Black Temple and Hyjal, P2 is SSC and Tempest Keep.
   Each URL is just that sheet's own share URL with the trailing
   "/edit?usp=sharing" swapped for "/preview" — no "Publish to web" step. It
   renders Google's live read-only view (colors, merged banners, tabs).
   Requirement: each sheet's General access must stay "Anyone with the link →
   Viewer" so members see it without a Google login; if you later restrict one to
   specific accounts, this frame becomes Google-account gated instead — and the
   loot-prio page, which reads the same docs through the backend, stops working
   too. The document ids are repeated as LootSheet:Docs in the backend's
   appsettings.json; change both together. */
const SHEET_DOCS = [
  { key:'p3', label:'P3 loot sheet — BT & Hyjal', id:'18MHJQi6vz9Ax2yPwreGhnKc0SwvC_xIy2iCBGGgwbb4' },
  { key:'p2', label:'P2 loot sheet — SSC & TK',   id:'12gqqN8Xu2CSQ6z6ETmI-UzjqqvUR2e9Cn_nN36GRKhw' }
];
const SHEET_PICK_KEY = 'vashj_loot_sheet_doc';

(function(){
  const host = document.getElementById('sheetEmbed');
  const pick = document.getElementById('sheetPick');
  const open = document.getElementById('sheetOpen');

  const connected = SHEET_DOCS.filter(d => d.id);
  if(!connected.length){
    host.innerHTML =
      '<div class="sheet-empty">The loot sheets aren’t connected yet.<br>' +
      'Paste each document id into <code>sheet.html</code> ' +
      '(<code>SHEET_DOCS</code>).</div>';
    return;
  }

  // Remembered because most people live in one phase's sheet and reopen the page
  // between pulls; the other is one click away.
  let current = null;
  try{ current = localStorage.getItem(SHEET_PICK_KEY); }catch(e){}
  if(!connected.some(d => d.key === current)) current = connected[0].key;

  const frame = document.createElement('iframe');
  frame.className = 'sheet-frame';
  frame.loading = 'lazy';
  host.appendChild(frame);

  function show(key){
    const doc = connected.find(d => d.key === key) || connected[0];
    const url = 'https://docs.google.com/spreadsheets/d/' + doc.id + '/preview';
    current = doc.key;
    frame.src = url;
    frame.title = doc.label;
    open.href = url;
    open.style.display = '';
    [...pick.children].forEach(b =>
      b.className = b.dataset.key === doc.key ? 'btn-primary' : 'btn-ghost');
    try{ localStorage.setItem(SHEET_PICK_KEY, doc.key); }catch(e){}
  }

  connected.forEach(doc => {
    const btn = document.createElement('button');
    btn.dataset.key = doc.key;
    btn.textContent = doc.label;
    btn.onclick = () => show(doc.key);
    pick.appendChild(btn);
  });
  show(current);
})();
</script>
