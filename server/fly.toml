# Fly.io config for the wooback-vash .NET API.
# First-time deploy:
#   cd server
#   fly launch --no-deploy        # or: fly apps create wooback-vash-api
#   fly postgres create           # then: fly postgres attach <pg-app>  (sets DATABASE_URL)
#   fly secrets set SESSION_SECRET=... DISCORD_CLIENT_SECRET=... RH_TOKEN=... \
#                   WCL_CLIENT_ID=... WCL_CLIENT_SECRET=...
#   fly deploy
app = "wooback-vash-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so the OAuth/proxy calls don't cold-start (see the
  # migration plan's "Risks" note). Set min_machines_running = 0 to save money
  # if you can tolerate a slow first request.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
