<meta charset="utf-8">
<script>
/* Access gate. Same as loot-history.html / loot-stats.html: the character sheet
   is open to any signed-in tier — it is built from /api/characters/sheet, which
   is session-gated; this only decides whether the page renders at all. */
(function(){
  var m = location.hash.match(/(?:^#|&)session=([^&]+)/);
  if(m){
    try{ localStorage.setItem('vashj_session', decodeURIComponent(m[1])); }catch(e){}
    history.replaceState(null, '', location.pathname + location.search);
  }
  function valid(tok){
    if(!tok) return false;
    try{
      var p = tok.split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
      while(p.length % 4) p += '=';
      var payload = JSON.parse(atob(p));
      return payload.exp && payload.exp > Math.floor(Date.now()/1000);
    }catch(e){ return false; }
  }
  var tok = null;
  try{ tok = localStorage.getItem('vashj_session'); }catch(e){}
  if(!valid(tok)){
    try{ localStorage.removeItem('vashj_session'); }catch(e){}
    location.replace('index.html');
  }
})();
</script>

  }
  .cs-panel-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  /* When there's no history picker, an empty .cs-picker still eats the free space
     (margin-left:auto), so the refresh button lands on the right either way. */

<script src="menu.js"></script>
<script>
// API_BASE and the item-link helpers (itemLink, loadWowhead) come from menu.js.
// The log names items and enchants itself; Wowhead supplies the hover tooltips
// and the gem names (gems come through as bare ids).

const WCL_HOST = 'https://fresh.warcraftlogs.com';

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// WoW class colours (Blizzard palette), shared with loot-history.html / loot-stats.html.
const CLASS_COLORS = {
  warrior:'#c79c6e', paladin:'#f58cba', hunter:'#abd473', rogue:'#fff569',
  priest:'#ffffff', deathknight:'#e0475f', shaman:'#3b8de0', mage:'#69ccf0',
  warlock:'#a99ce0', monk:'#00ff96', druid:'#ff7d0a', demonhunter:'#a330c9',
  evoker:'#33937f'
};
function classColor(cls){
  if(!cls) return null;
  return CLASS_COLORS[String(cls).toLowerCase().replace(/[^a-z]/g,'')] || null;
}

function fmtDate(s){
  if(!s) return '';
  const d = new Date(s);
  return isNaN(d) ? '' : d.toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
}
// "destruction" → "Destruction", but "dps" is an abbreviation, not a word.
function cap(s){
  if(!s) return '';
  const t = String(s);
  return t.toLowerCase() === 'dps' ? 'DPS' : t.charAt(0).toUpperCase() + t.slice(1);
}

/* ───────────────────────── Load ───────────────────────── */
const params = new URLSearchParams(location.search);
let CURRENT_ID = null;

async function api(path){
  const res = await fetch(API_BASE + path, { headers:{ 'Authorization':'Bearer ' + sessionToken() } });
  if(res.status === 401){ logout(); throw new Error('signed out'); }
  const body = await res.json().catch(() => null);
  if(!res.ok) throw new Error((body && body.detail) || ('HTTP ' + res.status));
  return body;
}

async function apiPost(path){
  const res = await fetch(API_BASE + path, { method:'POST', headers:{ 'Authorization':'Bearer ' + sessionToken() } });
  if(res.status === 401){ logout(); throw new Error('signed out'); }
  const body = await res.json().catch(() => null);
  if(!res.ok) throw new Error((body && body.detail) || ('HTTP ' + res.status));
  return body;
}

// Pull a fresh gear snapshot (Blizzard live, else the latest Warcraft Logs report)
// and re-render. Only wired up when the API said the viewer may — owner or officer.
async function refreshGear(){
  const btn = document.getElementById('gearRefresh');
  btn.disabled = true;
  const label = btn.textContent;
  btn.textContent = 'Refreshing…';
  try{
    const res = await apiPost('/api/characters/sheet/refresh?id=' + encodeURIComponent(CURRENT_ID));
    await load();       // re-render the sheet from the new snapshot
    loadWowhead();
    if(res && res.note){
      const note = document.getElementById('gearNote');
      note.textContent = res.note + ' ' + note.textContent;
    }
  }catch(err){
    document.getElementById('gearNote').textContent = err.message;
  }finally{
    btn.disabled = false;
    btn.textContent = label;
  }
}

async function load(){
  const q = params.get('id') ? '?id=' + encodeURIComponent(params.get('id'))
          : params.get('name') ? '?name=' + encodeURIComponent(params.get('name'))
          : '';
  let data;
  try{ data = await api('/api/characters/sheet' + q); }
  catch(err){
    document.getElementById('msg').textContent = err.message;
    return;
  }
  CURRENT_ID = data.character.id;
  render(data);
  document.getElementById('msg').style.display = 'none';
  document.getElementById('sheet').style.display = '';
  loadWowhead();
}

function render(d){
  renderHead(d.character);
  document.getElementById('gearRefresh').style.display = d.canRefreshGear ? '' : 'none';
  renderGear(d.gear, d.gearHistory);
  renderLoot(d.loot);
  renderRolls(d.rolls, d.summary);
  renderAttendance(d.attendance);
}

function renderHead(c){
  const col = classColor(c.cls);
  const bits = [];
  if(c.spec) bits.push(cap(c.spec));
  if(c.cls) bits.push(cap(c.cls));
  if(c.role) bits.push(cap(c.role));
  if(c.realm) bits.push(c.realm);

  const guild = c.guildSyncedAt
    ? (c.guildName ? '&lt;' + esc(c.guildName) + '&gt;' + (c.guildRank === 0 ? ' (GM)' : '')
                   : '<span class="cs-noench">not in the guild at the last sync</span>')
    : 'guild not synced yet';

  const alts = [{ id:c.id, name:c.name, cls:c.cls, isMain:c.isMain }].concat(c.alts || []);
  const altHtml = alts.length > 1
    ? '<div class="cs-alts">' + alts.map(function(a){
        const ac = classColor(a.cls);
        return '<a class="cs-alt' + (a.id === c.id ? ' here' : '') + '" href="character.html?id=' + esc(a.id) + '">'
             + '<span' + (ac ? ' style="color:' + ac + '"' : '') + '>' + esc(a.name) + '</span>'
             + (a.isMain ? ' <span class="cs-tag">main</span>' : '') + '</a>';
      }).join('') + '</div>'
    : '';

  document.getElementById('head').innerHTML =
      '<div class="cs-name"' + (col ? ' style="color:' + col + '"' : '') + '>' + esc(c.name) + '</div>'
    + '<div class="cs-sub">' + (bits.length ? '<b>' + esc(bits.join(' · ')) + '</b> — ' : '') + guild + '</div>'
    + '<div class="cs-sub">'
    + (c.member ? 'Played by <b>' + esc(c.member.name) + '</b>. ' : 'Not linked to a Discord member yet. ')
    + (c.setupUpdatedAt ? 'Setup last seen in a log on ' + esc(fmtDate(c.setupUpdatedAt)) + '.' : '')
    + '</div>'
    + altHtml;
}

/* ───────────────────────── Gear ─────────────────────────
   SLOT_ORDER (menu.js) is paperdoll order, so the list reads like the in-game
   character pane. Slots the snapshot has nothing for are simply left out. */

function renderGear(gear, history){
  const picker = document.getElementById('gearPicker');
  const note = document.getElementById('gearNote');
  const box = document.getElementById('gear');

  if(!gear){
    picker.innerHTML = '';
    note.textContent = '';
    box.innerHTML = '<div class="cs-empty">No gear snapshot yet — use <b>Refresh gear</b> above to pull it '
                  + 'from Blizzard (or the latest Warcraft Logs report), or an officer can import a raid’s '
                  + 'attendance.</div>';
    return;
  }

  // Older nights, when there are any. A live Blizzard snapshot reads as "Live
  // (Blizzard)" rather than a raid title, since it isn't tied to a night.
  if(history && history.length > 1){
    picker.innerHTML = '<select id="gearSelect">' + history.map(function(h){
      const label = h.source === 'blizzard'
        ? 'Live (Blizzard) — ' + fmtDate(h.recordedAt)
        : fmtDate(h.recordedAt) + (h.title ? ' — ' + h.title : '');
      return '<option value="' + esc(h.reportCode) + '"' + (h.reportCode === gear.reportCode ? ' selected' : '') + '>'
           + esc(label) + '</option>';
    }).join('') + '</select>';
    document.getElementById('gearSelect').addEventListener('change', async function(e){
      const code = e.target.value;
      try{
        const snap = await api('/api/characters/sheet/history?id=' + encodeURIComponent(CURRENT_ID)
                             + '&code=' + encodeURIComponent(code));
        renderGear(snap, history);
        loadWowhead();
      }catch(err){ note.textContent = err.message; }
    });
  }else{
    picker.innerHTML = '';
  }

  const when = fmtDate(gear.recordedAt);
  // Blizzard gear is live — "as of" the refresh, with no report to link. A WCL
  // snapshot is a raid night, so it keeps the "as raided" wording and the log link.
  const lead = gear.source === 'blizzard'
    ? 'Live from Blizzard, as of ' + esc(when)
    : 'As raided on ' + esc(when)
      + (gear.title ? ' — ' + esc(gear.title) : '')
      + ' (<a href="' + WCL_HOST + '/reports/' + esc(gear.reportCode) + '" target="_blank" rel="noopener">log</a>)';
  note.innerHTML = lead
    + (gear.itemLevel ? ' · item level ' + esc(gear.itemLevel) : '')
    + '. Hover an item for its tooltip.';

  // A slot can hold more than one item: the log covers the whole night, so swapping
  // a neck between bosses records both. Best item first, the rest noted underneath.
  const bySlot = {};
  (gear.items || []).forEach(function(i){
    (bySlot[i.slot] = bySlot[i.slot] || []).push(i);
  });
  Object.keys(bySlot).forEach(function(k){
    bySlot[k].sort(function(a, b){ return (b.ilvl || 0) - (a.ilvl || 0); });
  });

  const rows = SLOT_ORDER.filter(function(s){ return bySlot[s[0]]; }).map(function(s){
    const worn = bySlot[s[0]];
    const it = worn[0];
    // The enchant and gems ride along on the item's own tooltip; the gems also get
    // their own links below, since a gem id is an item id and so resolves to a name.
    const extra = (it.enchant ? '&ench=' + it.enchant : '')
                + (it.gems && it.gems.length ? '&gems=' + it.gems.join(':') : '');
    const link = itemLink(it.id, it.name || ('Item ' + it.id), extra);

    // The log names the enchant for us — an enchant id is not a spell id, so this
    // text exists nowhere else.
    const lines = [];
    if(it.enchantName) lines.push(esc(it.enchantName));
    else if(it.enchant) lines.push('Enchanted');
    else if(ENCHANTABLE.indexOf(s[0]) >= 0) lines.push('<span class="cs-noench">No enchant</span>');
    if(it.tempEnchantName) lines.push(esc(it.tempEnchantName));
    if(it.gems && it.gems.length){
      lines.push(it.gems.map(function(g){ return itemLink(g, 'Gem ' + g); }).join(', '));
    }
    if(worn.length > 1){
      lines.push('<span class="cs-swap">also worn: '
        + worn.slice(1).map(function(w){ return itemLink(w.id, w.name || ('Item ' + w.id)); }).join(', ')
        + '</span>');
    }

    return '<div class="cs-slot"><div class="cs-slot-label">' + esc(s[1]) + '</div>'
         + '<div class="cs-slot-body"><div class="cs-item">' + link + '</div>'
         + (lines.length ? '<div class="cs-extra">' + lines.join(' · ') + '</div>' : '')
         + '</div></div>';
  });

  box.innerHTML = rows.length
    ? '<div class="cs-gear">' + rows.join('') + '</div>'
    : '<div class="cs-empty">The log recorded no items for this night.</div>';
}

// Slots worth calling out when they carry no enchant. Only the ones anyone can
// enchant: trinkets and shirts never take one, and an off-hand or ranged slot is
// as often a bag or a wand as it is an enchantable weapon — flagging those would
// cry wolf on every caster.
const ENCHANTABLE = ['head','shoulder','back','chest','wrist','hands','legs','feet','mainhand'];

/* ───────────────────────── Loot & rolls ───────────────────────── */
function renderLoot(loot){
  const box = document.getElementById('loot');
  if(!loot || !loot.length){
    box.innerHTML = '<div class="cs-empty">Nothing awarded yet.</div>';
    return;
  }
  box.innerHTML = '<table class="cs-table"><thead><tr>'
    + '<th>Item</th><th>Where</th><th class="num">Roll</th><th class="num">Beat</th><th>Date</th>'
    + '</tr></thead><tbody>'
    + loot.map(function(l){
        const tags = (l.offSpec ? '<span class="cs-tag">OS</span>' : '')
                   + (l.softReserve ? '<span class="cs-tag">SR</span>' : '')
                   + (l.wishlist ? '<span class="cs-tag">WL</span>' : '')
                   + (l.tmb ? '<span class="cs-tag">TMB</span>' : '');
        return '<tr><td>' + (l.itemId ? itemLink(l.itemId, l.itemName) : esc(l.itemName)) + tags + '</td>'
             + '<td>' + esc(l.raid || (l.awardedBy ? 'from ' + l.awardedBy : '')) + '</td>'
             + '<td class="num">' + (l.roll == null ? '—' : esc(l.roll)) + '</td>'
             + '<td class="num">' + (l.contested ? esc(Math.max(0, l.contested - 1)) : '—') + '</td>'
             + '<td>' + esc(fmtDate(l.awardedAt)) + '</td></tr>';
      }).join('')
    + '</tbody></table>';
}

function renderRolls(rolls, s){
  document.getElementById('rollTiles').innerHTML =
      tile(s.rolls, 'rolls') + tile(s.wins, 'won') + tile(s.awards, 'items awarded')
    + tile(s.winRate == null ? '—' : s.winRate + '%', 'win rate')
    + tile(s.average == null ? '—' : s.average, 'average roll');

  const box = document.getElementById('rolls');
  if(!rolls || !rolls.length){
    box.innerHTML = '<div class="cs-empty">No rolls recorded — those come from a Gargul import.</div>';
    return;
  }
  box.innerHTML = '<table class="cs-table"><thead><tr>'
    + '<th>Item</th><th class="num">Roll</th><th>Result</th><th>Date</th>'
    + '</tr></thead><tbody>'
    + rolls.map(function(r){
        // The winner's name carries their class colour, as names do everywhere else.
        const winnerCol = classColor(r.lostToClass);
        const result = r.won ? '<span class="cs-won">Won</span>'
                     : r.disenchanted ? '<span class="cs-lost">Disenchanted</span>'
                     : r.lostTo
                       ? '<span class="cs-lost">Lost to </span><a href="character.html?id=' + esc(r.lostToId) + '"'
                         + (winnerCol ? ' style="color:' + winnerCol + '"' : '') + '>' + esc(r.lostTo) + '</a>'
                       : '<span class="cs-lost">Lost</span>';
        return '<tr><td>' + (r.itemId ? itemLink(r.itemId, r.itemName) : esc(r.itemName))
             + (r.classification ? '<span class="cs-tag">' + esc(r.classification) + '</span>' : '') + '</td>'
             + '<td class="num">' + esc(r.amount) + '</td>'
             + '<td>' + result + '</td>'
             + '<td>' + esc(fmtDate(r.rolledAt)) + '</td></tr>';
      }).join('')
    + '</tbody></table>';
}

function tile(value, label){
  return '<div><b>' + esc(value) + '</b>' + esc(label) + '</div>';
}

function renderAttendance(a){
  const box = document.getElementById('attendance');
  if(!a || !a.raids){
    box.innerHTML = '<div class="cs-empty">No raids imported for this character yet.</div>';
    return;
  }
  box.innerHTML = '<div class="cs-tiles">' + tile(a.raids, 'raids logged') + '</div>'
    + '<table class="cs-table"><thead><tr><th>Raid</th><th>Date</th><th>Status</th></tr></thead><tbody>'
    + a.recent.map(function(r){
        const title = esc(r.title || r.code || 'Raid');
        return '<tr><td>' + (r.code
                 ? '<a href="' + WCL_HOST + '/reports/' + esc(r.code) + '" target="_blank" rel="noopener">' + title + '</a>'
                 : title) + '</td>'
             + '<td>' + esc(fmtDate(r.startsAt)) + '</td>'
             + '<td>' + esc(r.status) + '</td></tr>';
      }).join('')
    + '</tbody></table>';
}

// loadWowhead() lives in menu.js — re-running it after a re-render (the
// older-snapshot picker) is what attaches tooltips to the new links.
document.getElementById('gearRefresh').addEventListener('click', refreshGear);
load();
</script>
